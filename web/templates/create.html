<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Vigil -- Digital-Candle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">Digital-Candle</a></h1>
            <p class="tagline">Light a candle. Be present.</p>
        </header>

        <div class="create-form">
            <h2>Create a Vigil</h2>
            <p class="form-description">
                A vigil is a place to gather and light candles together.
                Name it, choose a theme, and share it with others.
            </p>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/create">
                <div class="form-group">
                    <label for="name">Vigil Name</label>
                    <input type="text" id="name" name="name" required
                           placeholder="e.g. For Our Neighbors" maxlength="100">
                </div>

                <div class="form-group">
                    <label>Theme</label>
                    <div class="theme-options">
                        {% for key, theme in themes.items() %}
                        <label class="theme-option">
                            <input type="radio" name="theme" value="{{ key }}"
                                   {% if key == 'solidarity' %}checked{% endif %}>
                            <span class="theme-label">
                                <strong>{{ theme.name }}</strong>
                                <small>{{ theme.description }}</small>
                            </span>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="form-group">
                    <label for="dedication">Dedication (optional)</label>
                    <input type="text" id="dedication" name="dedication"
                           placeholder="e.g. In memory of those we have lost" maxlength="200">
                </div>

                <button type="submit" class="create-submit">Create Vigil</button>
            </form>
        </div>
    </div>
</body>
</html>
